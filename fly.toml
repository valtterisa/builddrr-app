app = 'builddrr-preview-f6a29fa92a3245c3b91d4c2dd8c2d172'
primary_region = 'arn'

[build]
  image = 'docker.io/valzuxxx/plain-nextjs-app:latest'

[[mounts]]
  source = 'user_volume'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
